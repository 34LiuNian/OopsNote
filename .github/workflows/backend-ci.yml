  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install pylint
    
    - name: Run Pylint
      run: |
        cd backend
        pylint $(git ls-files 'app/*.py') --output-format=github
    
  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install mypy
        pip install -e ".[dev]"
    
    - name: Run MyPy
      run: |
        cd backend
        mypy app/ --ignore-missing-imports --no-error-summary
